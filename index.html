        .price { font-size: 1.8em; color: #e01b1b; font-weight: bold; margin: 15px 0; }
        .desc { font-size: 0.95em; color: #606770; line-height: 1.5; margin-bottom: 20px; text-align: left; }
        .desc ul { padding-left: 20px; margin-top: 10px; }
        .desc li { margin-bottom: 8px; }

        .btn-video { background-color: #2c3e50; color: white; border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: background 0.3s; text-decoration: none; display: inline-block; width: 100%; box-sizing: border-box; }

            justify-content: center;

        }
